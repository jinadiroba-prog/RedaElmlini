<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DontSHare</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 20px;
    }

    .corner-image {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border: 1px solid #222;
    }

    .info-text {
      color: red;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .more-info {
      position: fixed;
      top: 10px;
      right: 15px;
      color: red;
      font-size: 16px;
      font-weight: bold;
      z-index: 9999;
    }

    a {
      color: red;
    }
  </style>

  <script>
    function checkBrowser() {

      // Skip redirect if user clicked "I Don't Care"
      if (localStorage.getItem("accepted") === "true") {
        return;
      }

      const ua = navigator.userAgent;

      // Detect Tor Browser
      const isTor = ua.includes("TorBrowser");

      if (!isTor) {
        window.location.href = "s.html";
      }
    }

    window.onload = checkBrowser;
  </script>

</head>

<body>

  <div class="more-info">Hire a Hitman</div>

  <div class="container">

    <img src="abc.jpg" alt="Image" class="corner-image">

    <div class="info-text">
      <div>Location : Morocco, Khouribga</div>
      <div>Date of birth : 23/3/2011</div>
      <div>School : Ussuf bin Tachfin</div>
      <div>weight : kg 80</div>
      <div>Price : 499.99$</div>
      <div>Days left : 180 days 2 hours</div>

      <div>
        <a href="https://www.instagram.com/reda1king/">media</a>
      </div>
    </div>

  </div>

</body>
</html>
